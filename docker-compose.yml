services:
  mongodb:
    image: mongo:7
    container_name: face-attendance-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: face-attendance-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/facerecognition
      DATABASE_NAME: facerecognition
      COLLECTION_NAME: students
      THRESHOLD: "0.6"
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"
    volumes:
      - deepface_data:/app/.deepface

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    container_name: face-attendance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  mongodb_data:
  deepface_data: